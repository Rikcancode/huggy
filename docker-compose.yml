# ZimaOS / CasaOS app store metadata (required for "Install from repo" in ZimaOS)
x-casaos:
  architectures:
    - amd64
    - arm64
  main: grocery-list
  author: Rikcancode
  category: Lifestyle
  description:
    en_us: |
      Self-hosted grocery list manager. Shopping lists, item library with categories,
      expiration calendar, repurchase reminders, supermarket aisle ordering. Web UI and API key auth.
  developer: Rikcancode
  tagline:
    en_us: Grocery lists, item library, expiration tracking and reminders
  title:
    en_us: Huggy (Grocery List)
  port_map: "8089"
  index: /

services:
  grocery-list:
    build: .
    image: grocery-list:latest
    container_name: grocery-list
    restart: unless-stopped
    ports:
      - "8089:8089"
    volumes:
      - grocery-data:/data
    environment:
      - GROCERY_DATABASE_URL=sqlite:////data/grocery.db
      - GROCERY_UPLOAD_DIR=/data/uploads
      - GROCERY_ADMIN_API_KEY=grocery-admin-key-2026
      - GROCERY_USER_API_KEY=grocery-user-key-2026
      - GROCERY_SEED_ON_STARTUP=true

volumes:
  grocery-data:
