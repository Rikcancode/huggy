# ZimaOS / CasaOS-style app manifest (optional)
# Only needed if the app store supports installing from a YAML that points to a GitHub repo.
# If the store only has "Install a customized app" and a text box, paste docker-compose.yml
# contents there instead — you do NOT need this file.
#
# When you push this repo to GitHub, set repository below and (if the store supports it)
# add this app via "Install from URL" or "Add from repository" using the repo URL or
# the raw URL to this file.

name: Mechou
tagline: Self-hosted grocery lists, item library, expiration calendar, repurchase reminders
description: |
  Manage shopping lists, an item library with categories, expiration tracking,
  repurchase reminders, and supermarket aisle ordering. Web UI, API key auth,
  SQLite or PostgreSQL.
category: productivity
icon: https://raw.githubusercontent.com/Rikcancode/huggy/main/app/static/icon.svg
type: docker-compose

repository: https://github.com/Rikcancode/huggy

# Optional: direct link to raw docker-compose.yml (some stores use this)
# compose_file: https://raw.githubusercontent.com/Rikcancode/huggy/main/docker-compose.yml

port: 8089
volumes:
  - grocery-data:/data
